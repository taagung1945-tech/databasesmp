  <script>
// ============ STATE ============
let allData = [];
let currentUser = null;
let currentPage = 'dashboard';
let appTheme = 'light';

const defaultConfig = { app_title: 'Sistem Administrasi Guru' };

// ============ ELEMENT SDK ============
if (window.elementSdk) {
    window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {},
        mapToCapabilities: (config) => ({ recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined }),
        mapToEditPanelValues: (config) => new Map([['app_title', config.app_title || defaultConfig.app_title]])
    });
}

// ============ DATA SDK ============
let sdkReady = false;
const dataHandler = {
    onDataChanged(data) {
        allData = data || [];
        if (currentUser) renderCurrentPage();
    }
};


// ============ DATA STORAGE LOKAL ============
// Sambungan Google Spreadsheet sudah dinonaktifkan.
// Data aplikasi disimpan di browser/perangkat melalui localStorage.
function createLocalDataSdk() {
    const storageKey = 'sistem_admin_guru_data_v1';
    let handlerRef = null;

    function readData() {
        try {
            return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch (err) {
            console.warn('Gagal membaca localStorage, data direset:', err);
            return [];
        }
    }

    function writeData(data) {
        localStorage.setItem(storageKey, JSON.stringify(data));
        if (handlerRef && typeof handlerRef.onDataChanged === 'function') {
            handlerRef.onDataChanged(data);
        }
    }

    function makeId() {
        return 'local_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    }

    return {
        async init(handler) {
            handlerRef = handler;
            const data = readData();
            if (handlerRef && typeof handlerRef.onDataChanged === 'function') {
                handlerRef.onDataChanged(data);
            }
            return { isOk: true };
        },
        async create(record) {
            const data = readData();
            const newRecord = { ...record, __backendId: record.__backendId || makeId() };
            data.push(newRecord);
            writeData(data);
            return { isOk: true, value: newRecord };
        },
        async update(record) {
            const data = readData();
            const index = data.findIndex(item => item.__backendId === record.__backendId);
            if (index === -1) return { isOk: false, error: { message: 'Data tidak ditemukan' } };
            data[index] = { ...record };
            writeData(data);
            return { isOk: true, value: data[index] };
        },
        async delete(record) {
            const data = readData();
            const nextData = data.filter(item => item.__backendId !== record.__backendId);
            writeData(nextData);
            return { isOk: true };
        }
    };
}

async function initDataSdk() {
    if (sdkReady) return true;
    window.dataSdk = createLocalDataSdk();
    const result = await window.dataSdk.init(dataHandler);
    sdkReady = !!(result && result.isOk);
    return sdkReady;
}

async function ensureDataReady() {
    if (sdkReady && window.dataSdk) return true;
    return await initDataSdk();
}

// Initialize Data SDK safely
initDataSdk();

// ============ HELPERS ============
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const colors = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
    const el = document.createElement('div');
    el.className = `toast px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg ${colors[type]}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function getByType(type) { return allData.filter(d => d.type === type); }

function normalizeClassLevel(value) {
    const text = String(value || '').toUpperCase().trim();
    if (text === '7' || text === 'VII') return 'VII';
    if (text === '8' || text === 'VIII') return 'VIII';
    if (text === '9' || text === 'IX') return 'IX';
    return text;
}

function getClassLevelRank(cls) {
    const rawLevel = normalizeClassLevel(cls?.class_level);
    const rawName = String(cls?.class_name || '').toUpperCase().trim();
    const detected = normalizeClassLevel(
        rawLevel ||
        (rawName.match(/^(VII|VIII|IX|7|8|9)(?=\s|[-_.\/]|[A-Z]|$)/)?.[1] || '')
    );
    const rank = { VII: 7, VIII: 8, IX: 9 };
    return rank[detected] || 999;
}

function getClassAlphabetKey(cls) {
    let name = String(cls?.class_name || '').trim();
    name = name
        .replace(/^kelas\s+/i, '')
        .replace(/^(VII|VIII|IX|7|8|9)\s*[-_.\/]*\s*/i, '')
        .trim();
    return name || String(cls?.class_name || '').trim();
}

function sortClasses(classes) {
    return [...classes].sort((a, b) => {
        const levelA = getClassLevelRank(a);
        const levelB = getClassLevelRank(b);
        if (levelA !== levelB) return levelA - levelB;

        const nameA = getClassAlphabetKey(a);
        const nameB = getClassAlphabetKey(b);
        const nameCompare = nameA.localeCompare(nameB, 'id', { numeric: true, sensitivity: 'base' });
        if (nameCompare !== 0) return nameCompare;

        return String(a.class_name || '').localeCompare(String(b.class_name || ''), 'id', { numeric: true, sensitivity: 'base' });
    });
}

function getClasses() { return sortClasses(getByType('class')); }
function getStudents() { return getByType('student'); }
function getSchedules() { return getByType('schedule'); }
function getAttendance() { return getByType('attendance'); }
function getScores() { return getByType('score'); }
function getJournals() { return getByType('journal'); }
function getUsers() { return getByType('user'); }

function classDropdown(selected = '', id = 'filter-class') {
    const cls = getClasses();
    return `<select id="${id}" class="px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" onchange="renderCurrentPage()">
        <option value="">Semua Kelas</option>
        ${cls.map(c => `<option value="${c.class_name}" ${c.class_name === selected ? 'selected' : ''}>${c.class_name}</option>`).join('')}
    </select>`;
}


function getLocalTodayISO() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
}

function getCurrentMonthValue() {
    return getLocalTodayISO().slice(0, 7);
}

function normalizeMonthValue(value, allowEmpty = true) {
    const raw = String(value || '').trim();
    if (!raw) return allowEmpty ? '' : getCurrentMonthValue();
    const match = raw.match(/^(\d{4})-(\d{2})$/);
    if (!match) return getCurrentMonthValue();
    const year = Number(match[1]);
    const month = Number(match[2]);
    if (year < 2000 || year > 2100 || month < 1 || month > 12) return getCurrentMonthValue();
    return raw;
}

function getAbsensiFilterMonthValue() {
    const monthSelect = document.getElementById('filter-month-select');
    const yearSelect = document.getElementById('filter-year-select');
    if (monthSelect && yearSelect) {
        const month = monthSelect.value;
        const year = yearSelect.value;
        if (!month) return '';
        return normalizeMonthValue(`${year}-${month}`, false);
    }
    const hidden = document.getElementById('filter-month')?.value || getCurrentMonthValue();
    return normalizeMonthValue(hidden, false);
}

function updateAbsensiMonthFilter() {
    const hidden = document.getElementById('filter-month');
    if (hidden) hidden.value = getAbsensiFilterMonthValue();
    renderCurrentPage();
}

function setAbsensiMonthToCurrent() {
    const current = getCurrentMonthValue();
    const [year, month] = current.split('-');
    const monthSelect = document.getElementById('filter-month-select');
    const yearSelect = document.getElementById('filter-year-select');
    const hidden = document.getElementById('filter-month');
    if (monthSelect) monthSelect.value = month;
    if (yearSelect) yearSelect.value = year;
    if (hidden) hidden.value = current;
    renderCurrentPage();
}

function setAbsenDateToday() {
    const input = document.getElementById('inp-abs-date');
    if (input) input.value = getLocalTodayISO();
}

function formatDateID(dateValue) {
    const raw = String(dateValue || '').trim();
    const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!match) return raw || '-';
    const [_, yyyy, mm, dd] = match;
    const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    return `${dd} ${bulan[Number(mm) - 1]} ${yyyy}`;
}

// ============ AUTH ============
function showRegister() { document.getElementById('login-form').classList.add('hidden'); document.getElementById('register-form').classList.remove('hidden'); hideError(); }
function showLogin() { document.getElementById('register-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); hideError(); }
function showError(msg) { const el = document.getElementById('login-error'); el.textContent = msg; el.classList.remove('hidden'); }
function hideError() { document.getElementById('login-error').classList.add('hidden'); }

async function doRegister() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim().toLowerCase();
    const pass = document.getElementById('reg-pass').value;
    const role = document.getElementById('reg-role').value;
    
    if (!name || !email || !pass) return showError('Semua field harus diisi');
    if (!/@gmail\.com$/i.test(email)) return showError('Email harus menggunakan @gmail.com');
    if (pass.length < 6) return showError('Password minimal 6 karakter');
    
    // Cek email sudah ada (case-insensitive)
    const exists = getUsers().find(u => (u.email || '').toLowerCase().trim() === email);
    if (exists) return showError('Email sudah terdaftar');
    
    const btn = window.event?.target || document.querySelector('#register-form button');
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    window.dataSdk.create({ 
        type: 'user', 
        name, 
        email, 
        password: pass, 
        role, 
        photo: '', 
        theme: 'light', 
        is_blocked: false, 
        created_at: new Date().toISOString() 
    }).then(r => {
        if (r.isOk) { 
            toast('✅ Akun berhasil dibuat! Silakan login.'); 
            showLogin(); 
            document.getElementById('login-email').value = email;
            document.getElementById('login-pass').value = '';
        }
        else { 
            showError('❌ Gagal mendaftar: ' + (r.error?.message || 'Silakan coba lagi'));
        }
        btn.disabled = false;
        btn.textContent = 'Daftar';
    });
}

async function loginWithGoogle() {
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    // Fungsi dihapus - gunakan login email/password saja
}

async function doLogin() {
    hideError();
    if (!await ensureDataReady()) return showError('❌ Sistem gagal dimuat. Silakan refresh halaman.');
    
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    
    if (!email || !pass) return showError('Email dan password harus diisi');
    
    // Cek pengguna di data lokal
    const user = getUsers().find(u => {
        const uEmail = (u.email || '').toLowerCase().trim();
        const inputEmail = email.toLowerCase().trim();
        return uEmail === inputEmail && u.password === pass;
    });
    
    if (!user) return showError('Email atau password salah');
    
    const isBlocked = user.is_blocked === true || user.is_blocked === 'true';
    if (isBlocked) return showError('⛔ Akun Anda telah diblokir');
    
    // Login berhasil
    currentUser = user;
    appTheme = user.theme || 'light';
    applyTheme();
    document.getElementById('page-login').classList.add('hidden');
    document.getElementById('page-app').classList.remove('hidden');
    renderSidebar();
    navigate('dashboard');
    toast('✅ Selamat datang, ' + currentUser.name);
}

function logout() {
    currentUser = null;
    document.getElementById('page-app').classList.add('hidden');
    document.getElementById('page-login').classList.remove('hidden');
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
}

function applyTheme() {
    if (appTheme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
}

// ============ NAVIGATION ============
function getMenuItems() {
    const role = currentUser?.role;
    let items = [
        { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' }
    ];
    if (role === 'admin' || role === 'wali_kelas') {
        items.push(
            { id: 'kelas', icon: 'school', label: 'Kelas' },
            { id: 'siswa', icon: 'users', label: 'Siswa' },
            { id: 'jadwal', icon: 'calendar', label: 'Jadwal' },
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' },
            { id: 'jurnal', icon: 'book-open', label: 'Jurnal Mengajar' }
        );
    }
    if (role === 'staff') {
        items.push(
            { id: 'absen', icon: 'clipboard-check', label: 'Absensi' }
        );
    }
    if (role === 'admin') {
        items.push({ id: 'pengguna', icon: 'users', label: 'Pengguna' });
    }
    items.push({ id: 'pengaturan', icon: 'settings', label: 'Pengaturan' });
    return items;
}

function renderSidebar() {
    const nav = document.getElementById('sidebar-nav');
    const items = getMenuItems();
    nav.innerHTML = items.map(i => `
        <button onclick="navigate('${i.id}')" class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition ${currentPage === i.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700'}">
            <i data-lucide="${i.icon}" class="w-4 h-4"></i> ${i.label}
        </button>
    `).join('');
    document.getElementById('user-name-display').textContent = currentUser.name;
    document.getElementById('user-role-display').textContent = currentUser.role;
    document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
    lucide.createIcons();
}

function navigate(page) {
    currentPage = page;
    renderSidebar();
    renderCurrentPage();
}

function renderCurrentPage() {
    const mc = document.getElementById('main-content');
    switch(currentPage) {
        case 'dashboard': mc.innerHTML = renderDashboard(); break;
        case 'kelas': mc.innerHTML = renderKelas(); break;
        case 'siswa': mc.innerHTML = renderSiswa(); break;
        case 'jadwal': mc.innerHTML = renderJadwal(); break;
        case 'absen': mc.innerHTML = renderAbsen(); break;
        case 'jurnal': mc.innerHTML = renderJurnal(); break;
        case 'pengguna': mc.innerHTML = renderPengguna(); break;
        case 'pengaturan': mc.innerHTML = renderPengaturan(); break;
        default: mc.innerHTML = renderDashboard();
    }
    lucide.createIcons();

async function importKelasFromFile() {
    const file = document.getElementById('class-file').files[0];
    if (!file) return toast('Pilih file terlebih dahulu', 'error');
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        
        // AGGRESSIVE ENCODING DETECTION - Try multiple with stricter validation
        let text = '';
        const encodings = ['utf-8', 'utf-16', 'iso-8859-1', 'windows-1252', 'cp1252'];
        let usedEncoding = '';
        
        for (const enc of encodings) {
            try {
                const decoded = new TextDecoder(enc, { fatal: true }).decode(uint8Array);
                // Strict validation: must contain Latin letters
                if (/[a-zA-Z]/.test(decoded) && decoded.length > 5) {
                    text = decoded;
                    usedEncoding = enc;
                    break;
                }
            } catch (e) {
                continue;
            }
        }
        
        if (!text) {
            return toast('❌ File tidak bisa dibaca. Pastikan format Excel atau CSV yang benar', 'error');
        }
        
        // AGGRESSIVE CLEANING
        text = text
            .replace(/[\x00-\x08\x0B-\x0C\x0E-\x1F]/g, '') // Remove control chars
            .replace(/\ufffd/g, '?') // Replace replacement char
            .replace(/[\u202E\u202D\u202C]/g, '') // Remove RTL/LTR marks
            .replace(/[^\x20-\x7E\n\r\t]/g, (char) => {
                // Keep only printable ASCII + newline/tab, replace others
                const code = char.charCodeAt(0);
                if (code >= 128 && code <= 255) return char; // Keep extended Latin
                return '';
            });
        
        const lines = text.split(/[\r\n]+/)
            .map(l => l.trim())
            .filter(l => l.length > 0 && /[a-zA-Z]/.test(l)); // Must contain letters
        
        if (lines.length < 2) {
            return toast('❌ File terlalu kecil atau kosong. Minimal 2 baris (header + 1 data)', 'error');
        }
        
        // Detect header & delimiter
        const firstLine = lines[0];
        const delimiter = firstLine.includes('\t') ? '\t' : firstLine.includes(';') ? ';' : ',';
        
        // Smart header detection
        const firstLineLower = firstLine.toLowerCase();
        const hasHeader = /nama|kelas|tingkat|class|level|name/.test(firstLineLower);
        const startIdx = hasHeader ? 1 : 0;
        
        let imported = 0;
        const seenClasses = new Set();
        
        for (let i = startIdx; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.length < 2) continue;
            
            // Split by delimiter
            let parts = line.split(delimiter).map(s => 
                s.trim()
                    .replace(/^["'`\s]+|["'`\s]+$/g, '')
                    .replace(/^=/g, '')
                    .substring(0, 100)
                    .trim()
            ).filter(s => s.length > 0);
            
            if (parts.length < 1) continue;
            
            const name = parts[0];
            const level = (parts[1] || 'VII').substring(0, 1).toUpperCase();
            
            // Strict validation
            if (!/^[a-zA-Z0-9\-\s\.]+$/.test(name)) continue; // Only alphanumeric, dash, space, dot
            if (!/^[VII|VIII|IX]$/.test(level)) continue; // Only valid levels
            if (name.length < 2 || name.length > 50) continue; // Reasonable length
            
            // Deduplicate
            const key = `${name}|${level}`.toLowerCase();
            if (seenClasses.has(key)) continue;
            seenClasses.add(key);
            
            // Check if exists in DB
            const exists = getClasses().find(c => c.class_name.toLowerCase() === name.toLowerCase());
            if (!exists) {
                const r = await window.dataSdk.create({
                    type: 'class',
                    class_name: name,
                    class_level: level || 'VII',
                    created_at: new Date().toISOString()
                });
                if (r.isOk) imported++;
            }
        }
        
        if (imported > 0) {
            toast(`✅ Impor ${imported} kelas berhasil!`);
            renderCurrentPage();
        } else {
            toast('⚠️ Tidak ada data baru yang diimpor (semua sudah ada atau format invalid)', 'info');
        }
    } catch (err) {
        console.error('Import error:', err);
        toast('❌ Error: ' + (err.message || 'File corrupt. Buat ulang di Excel → Save As → CSV UTF-8'), 'error');
    }
}

function renderSiswa() {
    const filterClass = document.getElementById('filter-class')?.value || '';
    let students = getStudents();
    if (filterClass) students = students.filter(s => s.class_id === filterClass);

    const totalStudents = getStudents().length;
    const classes = getClasses();
    const classOrder = new Map(classes.map((c, i) => [c.class_name, i]));

    const groupedStudents = {};
    students.forEach(s => {
        const className = s.class_id || 'Tanpa Kelas';
        if (!groupedStudents[className]) groupedStudents[className] = [];
        groupedStudents[className].push(s);
    });

    const classNames = Object.keys(groupedStudents).sort((a, b) => {
        const orderA = classOrder.has(a) ? classOrder.get(a) : 9999;
        const orderB = classOrder.has(b) ? classOrder.get(b) : 9999;
        if (orderA !== orderB) return orderA - orderB;
        return a.localeCompare(b, 'id', { numeric: true, sensitivity: 'base' });
    });

    const tableHeader = `
        <thead class="bg-slate-50 dark:bg-slate-700">
            <tr>
                <th class="px-4 py-3 text-left w-14">No</th>

                <th class="px-4 py-3 text-left">JK</th>
                <th class="px-4 py-3 text-center w-28">Aksi</th>

    const renderRows = (studentList) => studentList.map((s, idx) => `

                    <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                </button>
            </td>
        </tr>`).join('');

    const groupedTablesHTML = students.length === 0
        ? `<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center text-slate-400">Belum ada data siswa</div>`
        : classNames.map(className => {
            const list = groupedStudents[className];

                    <div class="flex items-center justify-between px-4 py-3 bg-slate-100 dark:bg-slate-700 border-b border-slate-200 dark:border-slate-600">
                        <div>
                            <h3 class="font-bold text-base text-slate-800 dark:text-slate-100">Kelas ${className}</h3>

                    </div>

                        <table class="w-full text-sm">
                            ${tableHeader}
                            <tbody>${renderRows(list)}</tbody>

                </div>`;
        }).join('');

    return `<div class="fade-in">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">

async function importSiswaFromFile() {
    const input = document.getElementById('siswa-import-file');
    const statusEl = document.getElementById('siswa-import-status');
    const file = input?.files?.[0];

    if (!file) {
        if (statusEl) statusEl.textContent = 'Belum ada file yang dipilih.';
        return toast('Pilih file Excel terlebih dahulu', 'error');
    }

    if (statusEl) statusEl.textContent = `Memproses file: ${file.name} ...`;
    toast('⏳ File sedang diproses...', 'info');

    try {
        await ensureDataReady();

        const fileName = (file.name || '').toLowerCase();
        let rows = [];

        if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
            if (!window.XLSX) {
                throw new Error('Library pembaca Excel belum termuat. Pastikan koneksi internet aktif lalu buka ulang aplikasi.');
            }

            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: false, raw: false });

            workbook.SheetNames.forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                const sheetRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                rows.push(...extractStudentsFromRows(sheetRows, sheetName));
            });
        } else if (fileName.endsWith('.csv')) {
            const text = await file.text();
            rows = parseCsvStudents(text);
        } else {
            throw new Error('Format file tidak didukung. Gunakan .xlsx, .xls, atau .csv');
        }

        if (!rows.length) {
            if (statusEl) statusEl.textContent = 'Data siswa tidak ditemukan. Pastikan kolom berisi NO, INDUK/NIS, NISN, NAMA SISWA, dan L/P.';
            return toast('❌ Data siswa tidak ditemukan di file', 'error');
        }

        const existingClasses = getClasses();
        const existingStudents = getStudents();
        const classCache = new Map(existingClasses.map(c => [String(c.class_name || '').toLowerCase(), c]));
        const studentKeyCache = new Set(existingStudents.map(s => makeStudentKey(s)).filter(Boolean));

        let classesCreated = 0;
        let imported = 0;
        let skipped = 0;

        for (const row of rows) {
            const className = row.class_id;
            const classLevel = row.class_level;
            const classKey = String(className).toLowerCase();

            if (!classCache.has(classKey)) {
                const classResult = await window.dataSdk.create({
                    type: 'class',
                    class_name: className,
                    class_level: classLevel,
                    created_at: new Date().toISOString()
                });
                if (classResult.isOk) {
                    classesCreated++;
                    classCache.set(classKey, classResult.value || { class_name: className, class_level: classLevel });
                }
            }

            const newKey = makeStudentKey(row);
            if (!newKey || studentKeyCache.has(newKey)) {
                skipped++;
                continue;
            }

            const result = await window.dataSdk.create({
                type: 'student',
                nis: row.nis || '',
                nisn: row.nisn || '',
                student_name: row.student_name,
                class_id: className,
                gender: row.gender,
                created_at: new Date().toISOString()
            });

            if (result.isOk) {
                imported++;
                studentKeyCache.add(newKey);
            } else {
                skipped++;
            }
        }

        const message = `✅ Import selesai: ${imported} siswa masuk, ${classesCreated} kelas dibuat${skipped ? `, ${skipped} data dilewati` : ''}`;
        if (statusEl) statusEl.textContent = message;
        toast(message);
        renderCurrentPage();
    } catch (err) {
        console.error('Import siswa error:', err);
        const message = '❌ Gagal import: ' + (err.message || 'File tidak valid');
        if (statusEl) statusEl.textContent = message;
        toast(message, 'error');
    } finally {
        if (input) input.value = '';
    }
}

function makeStudentKey(student) {
    const classId = String(student.class_id || '').trim().toLowerCase();
    const nisn = String(student.nisn || '').trim().toLowerCase();
    const nis = String(student.nis || '').trim().toLowerCase();
    const name = String(student.student_name || '').trim().toLowerCase();
    if (nisn) return `${classId}|nisn|${nisn}`;
    if (nis) return `${classId}|nis|${nis}`;
    if (name) return `${classId}|name|${name}`;
    return '';
}

function normalizeClassName(rawClass) {
    let value = String(rawClass || '').trim().toUpperCase();
    value = value.replace(/^KELAS\s+/i, '').replace(/\s+/g, '');

    const match = value.match(/^([789])[-\s]*([A-K])$/i);
    if (!match) return null;

    const roman = { '7': 'VII', '8': 'VIII', '9': 'IX' }[match[1]];
    return {
        class_name: `${roman} ${match[2].toUpperCase()}`,
        class_level: roman
    };
}

function normalizeGender(value) {
    const v = String(value || '').trim().toUpperCase();
    if (v.startsWith('P')) return 'P';
    return 'L';
}

function findHeaderRow(sheetRows) {
    for (let i = 0; i < sheetRows.length; i++) {
        const rowText = sheetRows[i].map(cell => String(cell || '').trim().toUpperCase()).join('|');
        if ((rowText.includes('NAMA') || rowText.includes('NAMA SISWA')) && (rowText.includes('INDUK') || rowText.includes('NIS'))) {
            return i;
        }
    }
    return -1;
}

function findColumnIndex(headerRow, patterns, fallbackIndex) {
    for (let i = 0; i < headerRow.length; i++) {
        const text = String(headerRow[i] || '').trim().toUpperCase();
        if (patterns.some(pattern => pattern.test(text))) return i;
    }
    return fallbackIndex;
}

function extractStudentsFromRows(sheetRows, sheetName = '') {
    const classInfo = normalizeClassName(sheetName);
    if (!classInfo) return [];

    const headerIndex = findHeaderRow(sheetRows);
    const headerRow = headerIndex >= 0 ? sheetRows[headerIndex] : [];
    const startRow = headerIndex >= 0 ? headerIndex + 1 : 0;

    const idxNis = findColumnIndex(headerRow, [/^INDUK$/, /^NIS$/, /NO\s*INDUK/], 1);
    const idxNisn = findColumnIndex(headerRow, [/^NISN$/], 2);
    const idxName = findColumnIndex(headerRow, [/NAMA/], 3);
    const idxGender = findColumnIndex(headerRow, [/^L\/P$/, /^JK$/, /KELAMIN/], 4);

    const output = [];
    for (let i = startRow; i < sheetRows.length; i++) {
        const row = sheetRows[i] || [];
        const name = String(row[idxName] || '').trim();
        const nis = String(row[idxNis] || '').trim();
        const nisn = String(row[idxNisn] || '').trim();
        const gender = normalizeGender(row[idxGender]);

        if (!name || name.length < 2) continue;
        if (/^(NAMA|NAMA SISWA|JUMLAH|WALI|GURU|TAHUN|DAFTAR)$/i.test(name)) continue;

        output.push({
            nis,
            nisn,
            student_name: name,
            gender,
            class_id: classInfo.class_name,
            class_level: classInfo.class_level
        });
    }
    return output;
}

function parseCsvStudents(text) {
    const cleaned = String(text || '').replace(/^\uFEFF/, '').trim();
    if (!cleaned) return [];

    const delimiter = cleaned.includes('\t') ? '\t' : cleaned.includes(';') ? ';' : ',';
    const lines = cleaned.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
    const output = [];
    let currentClass = null;

    for (const line of lines) {
        const parts = line.split(delimiter).map(part => part.trim().replace(/^['"]|['"]$/g, ''));
        const first = parts[0] || '';
        const classInfo = normalizeClassName(first);

        if (classInfo && parts.length === 1) {
            currentClass = classInfo;
            continue;
        }

        const rowText = parts.join('|').toUpperCase();
        if (rowText.includes('NAMA') && (rowText.includes('NIS') || rowText.includes('INDUK'))) continue;

        if (!currentClass && classInfo) {
            currentClass = classInfo;
        }

        let nis = '', nisn = '', name = '', gender = 'L';

        if (parts.length >= 5 && normalizeClassName(parts[0])) {
            const cls = normalizeClassName(parts[0]);
            currentClass = cls;
            nis = parts[1] || '';
            nisn = parts[2] || '';
            name = parts[3] || '';
            gender = normalizeGender(parts[4]);
        } else if (parts.length >= 4 && currentClass) {
            nis = parts[0] || '';
            nisn = parts[1] || '';
            name = parts[2] || '';
            gender = normalizeGender(parts[3]);
        } else if (parts.length >= 3 && currentClass) {
            nis = parts[0] || '';
            name = parts[1] || '';
            gender = normalizeGender(parts[2]);
        }

        if (currentClass && name && name.length > 1) {
            output.push({
                nis,
                nisn,
                student_name: name,
                gender,
                class_id: currentClass.class_name,
                class_level: currentClass.class_level
            });
        }
    }

    return output;
}

function normalizeCascadeText(value) {
    return String(value || '').trim().toLowerCase();
}

function studentIdentifierMatches(record, student) {
    if (!record || !student) return false;
    const recordName = normalizeCascadeText(record.student_name || record.nama_siswa || record.nama || record.name);
    const studentName = normalizeCascadeText(student.student_name || student.nama_siswa || student.nama || student.name);
    const recordClass = normalizeCascadeText(record.class_id || record.kelas || record.class_name);
    const studentClass = normalizeCascadeText(student.class_id || student.kelas || student.class_name);
    const recordNis = normalizeCascadeText(record.nis || record.induk);
    const studentNis = normalizeCascadeText(student.nis || student.induk);
    const recordNisn = normalizeCascadeText(record.nisn);
    const studentNisn = normalizeCascadeText(student.nisn);

    if (studentNisn && recordNisn && studentNisn === recordNisn) return true;
    if (studentNis && recordNis && studentNis === recordNis) return true;
    if (studentName && recordName && studentName === recordName && (!studentClass || !recordClass || studentClass === recordClass)) return true;
    return false;
}

function getCascadeDeleteRecordsForStudent(student) {
    const records = [];
    const className = String(student.class_id || '').trim();
    const remainingInClass = getStudents().filter(s =>
        s.__backendId !== student.__backendId &&
        String(s.class_id || '').trim().toLowerCase() === className.toLowerCase()
    );

    allData.forEach(item => {
        if (!item || item.__backendId === student.__backendId) return;

        // Hapus data yang memang menyimpan nama/NIS/NISN siswa, misalnya absensi atau nilai.
        if (studentIdentifierMatches(item, student)) {
            records.push(item);
            return;
        }

        // Jika siswa terakhir di kelas tersebut dihapus, bersihkan juga data kelas yang sudah kosong.
        if (className && remainingInClass.length === 0) {
            const itemClass = String(item.class_id || item.class_name || item.kelas || '').trim().toLowerCase();
            if (itemClass === className.toLowerCase() && ['class', 'schedule', 'attendance', 'score', 'journal'].includes(item.type)) {
                records.push(item);
            }
        }
    });

    records.push(student);
    const unique = new Map();
    records.forEach(item => {
        if (item && item.__backendId) unique.set(item.__backendId, item);
    });
    return Array.from(unique.values());
}

async function deleteRecordsCascade(records) {
    let deleted = 0;
    const byType = {};

    for (const record of records) {
        if (!record || !record.__backendId) continue;
        const r = await window.dataSdk.delete(record);
        if (r.isOk) {
            deleted++;
            byType[record.type || 'lainnya'] = (byType[record.type || 'lainnya'] || 0) + 1;
        }
    }

    return { deleted, byType };
}

function formatCascadeSummary(byType = {}) {
    const labels = {
        student: 'siswa',
        class: 'kelas',
        schedule: 'jadwal',
        attendance: 'absensi',
        score: 'nilai',
        journal: 'jurnal'
    };
    return Object.entries(byType)
        .filter(([, count]) => count > 0)
        .map(([type, count]) => `${count} ${labels[type] || type}`)
        .join(', ');
}

// ============ JADWAL ============
function normalizeScheduleDay(value) {
    const text = String(value || '').trim().toLowerCase();
    if (!text) return '';
    const map = {
        senin: 'Senin', monday: 'Senin', mon: 'Senin',
        selasa: 'Selasa', tuesday: 'Selasa', tue: 'Selasa',
        rabu: 'Rabu', wednesday: 'Rabu', wed: 'Rabu',
        kamis: 'Kamis', thursday: 'Kamis', thu: 'Kamis',
        jumat: 'Jumat', "jum'at": 'Jumat', friday: 'Jumat', fri: 'Jumat',
        sabtu: 'Sabtu', saturday: 'Sabtu', sat: 'Sabtu'
    };
    return map[text] || '';
}

function getScheduleDayRank(day) {
    const normalized = normalizeScheduleDay(day) || String(day || '').trim();
    const order = { Senin: 1, Selasa: 2, Rabu: 3, Kamis: 4, Jumat: 5, Sabtu: 6 };
    return order[normalized] || 99;
}

function normalizeScheduleTime(value) {
    if (value === null || value === undefined) return '';

    if (typeof value === 'number' && isFinite(value)) {
        const totalMinutes = Math.round(value * 24 * 60);
        const hours = Math.floor(totalMinutes / 60) % 24;
        const minutes = totalMinutes % 60;
        return String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0');
    }

    let text = String(value || '').trim();
    if (!text) return '';

    text = text.replace(/\s+/g, '').replace(/[.]/g, ':');
    const match = text.match(/(\d{1,2})[:：](\d{1,2})/);
    if (match) {
        const h = Math.min(23, Math.max(0, parseInt(match[1], 10)));
        const m = Math.min(59, Math.max(0, parseInt(match[2], 10)));
        return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    const compact = text.match(/^(\d{1,2})(\d{2})$/);
    if (compact) {
        const h = Math.min(23, Math.max(0, parseInt(compact[1], 10)));
        const m = Math.min(59, Math.max(0, parseInt(compact[2], 10)));
        return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    return text;
}

function splitScheduleTimeRange(value) {
    const text = String(value || '').trim();
    if (!text) return { start: '', end: '' };
    const parts = text.split(/\s*(?:-|–|—|s\/d|sd|sampai)\s*/i).filter(Boolean);
    if (parts.length >= 2) {
        return { start: normalizeScheduleTime(parts[0]), end: normalizeScheduleTime(parts[1]) };
    }
    return { start: normalizeScheduleTime(text), end: '' };
}

function detectScheduleClassLevel(className) {
    const text = String(className || '').toUpperCase().trim();
    const romanMatch = text.match(/^(VII|VIII|IX)\b/);
    if (romanMatch) return romanMatch[1];
    const numberMatch = text.match(/^([789])\s*[-_.\/]?\s*/);
    if (numberMatch) return normalizeClassLevel(numberMatch[1]);
    return '';
}

function normalizeScheduleClassName(value) {
    let text = String(value || '').trim();
    if (!text) return null;

    text = text.replace(/^kelas\s+/i, '').replace(/\s+/g, ' ').trim().toUpperCase();

    let match = text.match(/^([789])\s*[-_.\/]?\s*([A-Z])$/i);
    if (match) {
        const level = normalizeClassLevel(match[1]);
        return { class_name: `${level} ${match[2].toUpperCase()}`, class_level: level };
    }

    match = text.match(/^(VII|VIII|IX)\s*[-_.\/]?\s*([A-Z])$/i);
    if (match) {
        const level = normalizeClassLevel(match[1]);
        return { class_name: `${level} ${match[2].toUpperCase()}`, class_level: level };
    }

    match = text.match(/^(VII|VIII|IX)\s+(.+)$/i);
    if (match) {
        const level = normalizeClassLevel(match[1]);
        return { class_name: `${level} ${match[2].trim().toUpperCase()}`, class_level: level };
    }

    return { class_name: text, class_level: detectScheduleClassLevel(text) };
}

function makeScheduleKey(schedule) {
    return [
        normalizeScheduleDay(schedule.day) || schedule.day || '',
        String(schedule.class_id || '').trim().toLowerCase(),
        String(schedule.subject || '').trim().toLowerCase(),
        normalizeScheduleTime(schedule.time_start),
        normalizeScheduleTime(schedule.time_end)
    ].join('|');
}

function sortSchedules(schedules) {
    const classOrder = new Map(getClasses().map((c, idx) => [String(c.class_name || '').toLowerCase(), idx]));
    return [...schedules].sort((a, b) => {
        const dayCompare = getScheduleDayRank(a.day) - getScheduleDayRank(b.day);
        if (dayCompare !== 0) return dayCompare;

        const classA = String(a.class_id || '').toLowerCase();
        const classB = String(b.class_id || '').toLowerCase();
        const orderA = classOrder.has(classA) ? classOrder.get(classA) : 9999;
        const orderB = classOrder.has(classB) ? classOrder.get(classB) : 9999;
        if (orderA !== orderB) return orderA - orderB;

        const timeCompare = normalizeScheduleTime(a.time_start).localeCompare(normalizeScheduleTime(b.time_start));
        if (timeCompare !== 0) return timeCompare;

        return String(a.subject || '').localeCompare(String(b.subject || ''), 'id', { numeric: true, sensitivity: 'base' });
    });
}

function findScheduleHeaderRow(sheetRows) {
    for (let i = 0; i < sheetRows.length; i++) {
        const rowText = (sheetRows[i] || []).map(cell => String(cell || '').trim().toUpperCase()).join('|');
        const hasSubject = /MAPEL|MATA\s*PELAJARAN|PELAJARAN|SUBJECT/.test(rowText);
        const hasContext = /HARI|KELAS|WAKTU|JAM|MULAI|SELESAI/.test(rowText);
        if (hasSubject && hasContext) return i;
    }
    return -1;
}

function findScheduleColumnIndex(headerRow, patterns, fallbackIndex = -1) {
    for (let i = 0; i < headerRow.length; i++) {
        const text = String(headerRow[i] || '').trim().toUpperCase();
        if (patterns.some(pattern => pattern.test(text))) return i;
    }
    return fallbackIndex;
}

function rowHasScheduleHeader(row) {
    const text = (row || []).map(cell => String(cell || '').trim().toUpperCase()).join('|');
    return /MAPEL|MATA\s*PELAJARAN|PELAJARAN|SUBJECT/.test(text) && /HARI|KELAS|WAKTU|JAM|MULAI|SELESAI/.test(text);
}

function extractSchedulesFromRows(sheetRows, sheetName = '') {
    const rows = Array.isArray(sheetRows) ? sheetRows : [];
    const sheetClass = normalizeScheduleClassName(sheetName);
    const headerIndex = findScheduleHeaderRow(rows);
    const headerRow = headerIndex >= 0 ? rows[headerIndex] : [];
    const startRow = headerIndex >= 0 ? headerIndex + 1 : 0;

    const hasClassHeader = headerRow.some(cell => /KELAS|CLASS|ROMBEL/i.test(String(cell || '')));
    const idxDay = findScheduleColumnIndex(headerRow, [/^HARI$/, /^DAY$/], 0);
    const idxClass = findScheduleColumnIndex(headerRow, [/^KELAS$/, /ROMBEL/, /^CLASS$/], hasClassHeader ? 1 : -1);
    const idxSubject = findScheduleColumnIndex(headerRow, [/MAPEL/, /MATA\s*PELAJARAN/, /^PELAJARAN$/, /^SUBJECT$/], hasClassHeader ? 2 : 1);
    const idxStart = findScheduleColumnIndex(headerRow, [/MULAI/, /JAM\s*KE-?1/, /START/], hasClassHeader ? 3 : 2);
    const idxEnd = findScheduleColumnIndex(headerRow, [/SELESAI/, /AKHIR/, /END/], hasClassHeader ? 4 : 3);
    const idxTime = findScheduleColumnIndex(headerRow, [/WAKTU/, /^JAM$/], -1);

    const output = [];
    let currentDay = '';
    let currentClass = sheetClass;

    for (let i = startRow; i < rows.length; i++) {
        const row = rows[i] || [];
        if (!row.length || row.every(cell => String(cell || '').trim() === '')) continue;
        if (rowHasScheduleHeader(row)) continue;

        const oneCell = row.filter(cell => String(cell || '').trim() !== '');
        if (oneCell.length === 1) {
            const possibleDay = normalizeScheduleDay(oneCell[0]);
            const possibleClass = normalizeScheduleClassName(oneCell[0]);
            if (possibleDay) {
                currentDay = possibleDay;
                continue;
            }
            if (possibleClass && detectScheduleClassLevel(possibleClass.class_name)) {
                currentClass = possibleClass;
                continue;
            }
        }

        const rawDay = idxDay >= 0 ? row[idxDay] : '';
        const day = normalizeScheduleDay(rawDay) || currentDay;
        if (day) currentDay = day;

        const classFromRow = idxClass >= 0 ? normalizeScheduleClassName(row[idxClass]) : null;
        const classInfo = classFromRow || currentClass || sheetClass;
        if (classFromRow) currentClass = classFromRow;

        const subject = String(row[idxSubject] || '').trim();
        if (!subject || /^(MAPEL|MATA PELAJARAN|PELAJARAN|SUBJECT|ISTIRAHAT)$/i.test(subject)) continue;

        let timeStart = idxStart >= 0 ? normalizeScheduleTime(row[idxStart]) : '';
        let timeEnd = idxEnd >= 0 ? normalizeScheduleTime(row[idxEnd]) : '';

        if ((!timeStart || !timeEnd) && idxTime >= 0) {
            const range = splitScheduleTimeRange(row[idxTime]);
            timeStart = timeStart || range.start;
            timeEnd = timeEnd || range.end;
        }

        if (!day || !classInfo || !classInfo.class_name) continue;

        output.push({
            day,
            class_id: classInfo.class_name,
            class_level: classInfo.class_level || detectScheduleClassLevel(classInfo.class_name),
            subject,
            time_start: timeStart,
            time_end: timeEnd
        });
    }

    return output;
}

function parseCsvSchedules(text) {
    const cleaned = String(text || '').replace(/^\uFEFF/, '').trim();
    if (!cleaned) return [];

    const delimiter = cleaned.includes('\t') ? '\t' : cleaned.includes(';') ? ';' : ',';
    const sheetRows = cleaned.split(/\r?\n/).map(line => line.split(delimiter).map(part => part.trim().replace(/^['"]|['"]$/g, '')));
    return extractSchedulesFromRows(sheetRows, 'JADWAL');
}

function downloadScheduleTemplate() {
    const rows = [
        ['HARI', 'KELAS', 'MAPEL', 'MULAI', 'SELESAI'],
        ['Senin', 'VIII A', 'Matematika', '07:00', '07:40'],
        ['Senin', 'VIII A', 'Bahasa Indonesia', '07:40', '08:20'],
        ['Selasa', 'VIII B', 'IPA', '08:20', '09:00']
    ];

    if (window.XLSX) {
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'JADWAL');
        XLSX.writeFile(wb, 'Template_Import_Jadwal.xlsx');
    } else {
        const csv = rows.map(row => row.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', 'Template_Import_Jadwal.csv');
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    toast('Template jadwal berhasil diunduh');
}

async function importSchedulesFromFile() {
    const input = document.getElementById('schedule-import-file');
    const statusEl = document.getElementById('schedule-import-status');
    const file = input?.files?.[0];

    if (!file) {
        if (statusEl) statusEl.textContent = 'Belum ada file yang dipilih.';
        return toast('Pilih file Excel jadwal terlebih dahulu', 'error');
    }

    if (statusEl) statusEl.textContent = `Memproses file: ${file.name} ...`;
    toast('⏳ File jadwal sedang diproses...', 'info');

    try {
        await ensureDataReady();
        const fileName = (file.name || '').toLowerCase();
        let schedules = [];

        if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
            if (!window.XLSX) {
                throw new Error('Library pembaca Excel belum termuat. Pastikan koneksi internet aktif lalu buka ulang aplikasi.');
            }
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: false, raw: false });
            workbook.SheetNames.forEach(sheetName => {
                const sheet = workbook.Sheets[sheetName];
                const sheetRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
                schedules.push(...extractSchedulesFromRows(sheetRows, sheetName));
            });
        } else if (fileName.endsWith('.csv')) {
            const text = await file.text();
            schedules = parseCsvSchedules(text);
        } else {
            throw new Error('Format file tidak didukung. Gunakan .xlsx, .xls, atau .csv');
        }

        if (!schedules.length) {
            if (statusEl) statusEl.textContent = 'Jadwal tidak ditemukan. Pastikan kolomnya berisi HARI, KELAS, MAPEL, MULAI, SELESAI atau WAKTU.';
            return toast('❌ Data jadwal tidak ditemukan di file', 'error');
        }

        const existingClasses = getClasses();
        const classCache = new Map(existingClasses.map(c => [String(c.class_name || '').toLowerCase(), c]));
        const existingScheduleKeys = new Set(getSchedules().map(s => makeScheduleKey(s)));

        let classesCreated = 0;
        let imported = 0;
        let skipped = 0;

        for (const schedule of schedules) {
            const normalizedClass = normalizeScheduleClassName(schedule.class_id);
            if (!normalizedClass || !normalizedClass.class_name || !schedule.subject || !schedule.day) {
                skipped++;
                continue;
            }

            schedule.class_id = normalizedClass.class_name;
            schedule.class_level = normalizedClass.class_level || schedule.class_level || detectScheduleClassLevel(normalizedClass.class_name);
            schedule.day = normalizeScheduleDay(schedule.day) || schedule.day;
            schedule.time_start = normalizeScheduleTime(schedule.time_start);
            schedule.time_end = normalizeScheduleTime(schedule.time_end);

            const classKey = String(schedule.class_id || '').toLowerCase();
            if (!classCache.has(classKey)) {
                const classResult = await window.dataSdk.create({
                    type: 'class',
                    class_name: schedule.class_id,
                    class_level: schedule.class_level || detectScheduleClassLevel(schedule.class_id) || '',
                    created_at: new Date().toISOString()
                });
                if (classResult.isOk) {
                    classCache.set(classKey, classResult.value || { class_name: schedule.class_id, class_level: schedule.class_level });
                    classesCreated++;
                }
            }

            const key = makeScheduleKey(schedule);
            if (existingScheduleKeys.has(key)) {
                skipped++;
                continue;
            }

            const result = await window.dataSdk.create({
                type: 'schedule',
                day: schedule.day,
                class_id: schedule.class_id,
                subject: schedule.subject,
                time_start: schedule.time_start,
                time_end: schedule.time_end,
                created_at: new Date().toISOString()
            });

            if (result.isOk) {
                imported++;
                existingScheduleKeys.add(key);
            } else {
                skipped++;
            }
        }

        if (statusEl) statusEl.textContent = `Selesai: ${imported} jadwal masuk, ${classesCreated} kelas dibuat, ${skipped} data dilewati.`;
        toast(`✅ Import selesai: ${imported} jadwal masuk, ${classesCreated} kelas dibuat, ${skipped} dilewati`);
        renderCurrentPage();
    } catch (err) {
        console.error('Import jadwal error:', err);
        if (statusEl) statusEl.textContent = 'Gagal import: ' + (err.message || err);
        toast('❌ Gagal import jadwal: ' + (err.message || 'File tidak sesuai format'), 'error');
    }
}

async function importAbsenFromFile() {
    const file = document.getElementById('absen-file').files[0];
    if (!file) return toast('Pilih file terlebih dahulu', 'error');
    
    try {
        const arrayBuffer = await file.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        
        // AGGRESSIVE ENCODING DETECTION
        let text = '';
        const encodings = ['utf-8', 'utf-16', 'iso-8859-1', 'windows-1252', 'cp1252'];
        
        for (const enc of encodings) {
            try {
                const decoded = new TextDecoder(enc, { fatal: true }).decode(uint8Array);
                if (/[a-zA-Z0-9]/.test(decoded) && decoded.length > 5) {
                    text = decoded;
                    break;
                }
            } catch (e) {
                continue;
            }
        }
        
        if (!text) return toast('❌ File tidak bisa dibaca', 'error');
        
        // AGGRESSIVE CLEANING
        text = text
            .replace(/[\x00-\x08\x0B-\x0C\x0E-\x1F]/g, '')
            .replace(/\ufffd/g, '?')
            .replace(/[\u202E\u202D\u202C]/g, '')
            .replace(/[^\x20-\x7E\n\r\t]/g, (char) => {
                const code = char.charCodeAt(0);
                if (code >= 128 && code <= 255) return char;
                return '';
            });
        
        const lines = text.split(/[\r\n]+/)
            .map(l => l.trim())
            .filter(l => l.length > 0);
        
        if (lines.length < 2) return toast('❌ File terlalu kecil', 'error');
        
        const firstLine = lines[0];
        const delimiter = firstLine.includes('\t') ? '\t' : firstLine.includes(';') ? ';' : ',';
        const firstLineLower = firstLine.toLowerCase();
        const hasHeader = /tanggal|nama|kelas|status|date|name/.test(firstLineLower);
        const startIdx = hasHeader ? 1 : 0;
        
        let imported = 0;
        
        for (let i = startIdx; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.length < 2) continue;
            
            let parts = line.split(delimiter).map(s => 
                s.trim()
                    .replace(/^["'`\s]+|["'`\s]+$/g, '')
                    .replace(/^=/g, '')
                    .substring(0, 100)
                    .trim()
            ).filter(s => s.length > 0);
            
            if (parts.length < 3) continue;
            
            const [date, name, cls, status] = parts;
            
            // Validate data
            if (!date || date.length < 5) continue;
            if (!name || name.length < 2) continue;
            if (!cls || cls.length < 1) continue;
            if (!status || !/^(HADIR|IZIN|SAKIT|ALPA)$/i.test(status)) continue;
            
            const r = await window.dataSdk.create({
                type: 'attendance',
                date: date,
                student_name: name,
                class_id: cls,
                status: status.toUpperCase(),
                created_at: new Date().toISOString()
            });
            if (r.isOk) imported++;
        }
        
        if (imported > 0) {
            toast(`✅ Impor ${imported} data absensi berhasil!`);
            renderCurrentPage();
        } else {
            toast('⚠️ Tidak ada data baru diimpor', 'info');
        }
    } catch (err) {
        console.error('Import error:', err);
        toast('❌ Error: File corrupt atau format invalid', 'error');
    }
}

// ============ DOWNLOAD EXCEL ABSENSI ============
function getDayNameID(dateValue) {
    const raw = String(dateValue || '').trim();
    const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!match) return '-';
    const d = new Date(`${raw}T00:00:00`);
    if (Number.isNaN(d.getTime())) return '-';
    return ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()];
}

function getMonthLabelID(monthValue) {
    const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const raw = String(monthValue || '').trim();
    const match = raw.match(/^(\d{4})-(\d{2})$/);
    if (!match) return 'Semua Bulan';
    return `${bulan[Number(match[2]) - 1]} ${match[1]}`;
}

function statusLabelID(status) {
    const value = String(status || '').toUpperCase();
    const labels = { HADIR: 'Hadir', IZIN: 'Izin', SAKIT: 'Sakit', ALPA: 'Alpa' };
    return labels[value] || value || '-';
}

function safeFileName(value) {
    return String(value || 'Semua')
        .replace(/[^a-zA-Z0-9\-_]+/g, '_')
        .replace(/_+/g, '_')
        .replace(/^_|_$/g, '') || 'Semua';
}

function styleCell(ws, cellRef, style) {
    if (!ws[cellRef]) return;
    ws[cellRef].s = style;
}

function styleRange(ws, rangeRef, style) {
    const range = XLSX.utils.decode_range(rangeRef);
    for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
            styleCell(ws, XLSX.utils.encode_cell({ r, c }), style);
        }
    }
}

function buildAbsensiData(filterClass, filterMonth) {
    let attendance = getAttendance();
    if (filterClass) attendance = attendance.filter(a => a.class_id === filterClass);
    if (filterMonth) attendance = attendance.filter(a => a.date && a.date.startsWith(filterMonth));

    return [...attendance].sort((a, b) => {
        const dateCompare = String(a.date || '').localeCompare(String(b.date || ''));
        if (dateCompare !== 0) return dateCompare;
        const classCompare = String(a.class_id || '').localeCompare(String(b.class_id || ''), 'id', { numeric: true, sensitivity: 'base' });
        if (classCompare !== 0) return classCompare;
        return String(a.student_name || '').localeCompare(String(b.student_name || ''), 'id', { numeric: true, sensitivity: 'base' });
    });
}

function applyAbsensiSheetStyle(ws, lastRow, lastCol) {
    const titleStyle = {
        font: { bold: true, sz: 16 },
        alignment: { horizontal: 'center', vertical: 'center' }
    };
    const headerStyle = {
        font: { bold: true, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: '2563EB' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
        border: {
            top: { style: 'thin', color: { rgb: 'CBD5E1' } },
            bottom: { style: 'thin', color: { rgb: 'CBD5E1' } },
            left: { style: 'thin', color: { rgb: 'CBD5E1' } },
            right: { style: 'thin', color: { rgb: 'CBD5E1' } }
        }
    };
    const labelStyle = { font: { bold: true }, alignment: { vertical: 'center' } };
    const cellStyle = {
        alignment: { vertical: 'center', wrapText: true },
        border: {
            top: { style: 'thin', color: { rgb: 'E2E8F0' } },
            bottom: { style: 'thin', color: { rgb: 'E2E8F0' } },
            left: { style: 'thin', color: { rgb: 'E2E8F0' } },
            right: { style: 'thin', color: { rgb: 'E2E8F0' } }
        }
    };

    styleCell(ws, 'A1', titleStyle);
    ['A3','A4','A5','A7','A8'].forEach(ref => styleCell(ws, ref, labelStyle));
    styleRange(ws, `A10:${XLSX.utils.encode_col(lastCol)}10`, headerStyle);
    if (lastRow >= 11) styleRange(ws, `A11:${XLSX.utils.encode_col(lastCol)}${lastRow}`, cellStyle);
}

function downloadAbsensiExcel(filterClass, filterMonth) {
    if (!window.XLSX) {
        return toast('Library Excel belum termuat. Pastikan koneksi internet aktif lalu buka ulang aplikasi.', 'error');
    }

    const attendance = buildAbsensiData(filterClass, filterMonth);
    if (attendance.length === 0) {
        return toast('Tidak ada data absensi untuk diunduh', 'info');
    }

    const kelasLabel = filterClass || 'Semua Kelas';
    const bulanLabel = getMonthLabelID(filterMonth);
    const downloadedAt = formatDateID(getLocalTodayISO());
    const counts = { HADIR: 0, IZIN: 0, SAKIT: 0, ALPA: 0 };

    attendance.forEach(a => {
        const status = String(a.status || '').toUpperCase();
        if (counts[status] !== undefined) counts[status] += 1;
    });

    const dataRows = attendance.map((a, idx) => [
        idx + 1,
        a.date || '',
        formatDateID(a.date),
        getDayNameID(a.date),
        a.student_name || '-',
        a.class_id || '-',
        statusLabelID(a.status)
    ]);

    const dataAoa = [
        ['REKAP DATA ABSENSI SISWA'],
        [],
        ['Kelas', kelasLabel],
        ['Periode', bulanLabel],
        ['Tanggal Download', downloadedAt],
        [],
        ['Ringkasan Absensi'],
        ['Hadir', counts.HADIR, 'Izin', counts.IZIN, 'Sakit', counts.SAKIT, 'Alpa', counts.ALPA, 'Total', attendance.length],
        [],
        ['No', 'Tanggal', 'Tanggal Lengkap', 'Hari', 'Nama Siswa', 'Kelas', 'Status'],
        ...dataRows
    ];

    const wb = XLSX.utils.book_new();
    const wsData = XLSX.utils.aoa_to_sheet(dataAoa);
    wsData['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 6 } },
        { s: { r: 6, c: 0 }, e: { r: 6, c: 6 } }
    ];
    wsData['!cols'] = [
        { wch: 6 },
        { wch: 14 },
        { wch: 20 },
        { wch: 12 },
        { wch: 34 },
        { wch: 14 },
        { wch: 12 }
    ];
    wsData['!rows'] = [
        { hpt: 24 }, {}, {}, {}, {}, {}, { hpt: 20 }, { hpt: 20 }, {}, { hpt: 24 }
    ];
    const lastDataRow = dataAoa.length;
    wsData['!autofilter'] = { ref: `A10:G${lastDataRow}` };
    applyAbsensiSheetStyle(wsData, lastDataRow, 6);
    XLSX.utils.book_append_sheet(wb, wsData, 'Data Absensi');

    const recapMap = new Map();
    attendance.forEach(a => {
        const key = `${a.class_id || '-'}|||${a.student_name || '-'}`;
        if (!recapMap.has(key)) {
            recapMap.set(key, { nama: a.student_name || '-', kelas: a.class_id || '-', HADIR: 0, IZIN: 0, SAKIT: 0, ALPA: 0, total: 0 });
        }
        const item = recapMap.get(key);
        const status = String(a.status || '').toUpperCase();
        if (item[status] !== undefined) item[status] += 1;
        item.total += 1;
    });

    const recapRows = Array.from(recapMap.values())
        .sort((a, b) => {
            const classCompare = String(a.kelas).localeCompare(String(b.kelas), 'id', { numeric: true, sensitivity: 'base' });
            if (classCompare !== 0) return classCompare;
            return String(a.nama).localeCompare(String(b.nama), 'id', { numeric: true, sensitivity: 'base' });
        })
        .map((item, idx) => [idx + 1, item.nama, item.kelas, item.HADIR, item.IZIN, item.SAKIT, item.ALPA, item.total]);

    const recapAoa = [
        ['REKAP ABSENSI PER SISWA'],
        [],
        ['Kelas', kelasLabel],
        ['Periode', bulanLabel],
        ['Tanggal Download', downloadedAt],
        [],
        ['No', 'Nama Siswa', 'Kelas', 'Hadir', 'Izin', 'Sakit', 'Alpa', 'Total'],
        ...recapRows
    ];
    const wsRecap = XLSX.utils.aoa_to_sheet(recapAoa);
    wsRecap['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 7 } }];
    wsRecap['!cols'] = [
        { wch: 6 }, { wch: 34 }, { wch: 14 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }
    ];
    wsRecap['!autofilter'] = { ref: `A7:H${recapAoa.length}` };
    styleCell(wsRecap, 'A1', { font: { bold: true, sz: 16 }, alignment: { horizontal: 'center', vertical: 'center' } });
    ['A3','A4','A5'].forEach(ref => styleCell(wsRecap, ref, { font: { bold: true } }));
    styleRange(wsRecap, 'A7:H7', {
        font: { bold: true, color: { rgb: 'FFFFFF' } },
        fill: { fgColor: { rgb: '2563EB' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
    });
    XLSX.utils.book_append_sheet(wb, wsRecap, 'Rekap Siswa');

    const fileName = `Absensi_${safeFileName(kelasLabel)}_${safeFileName(bulanLabel)}.xlsx`;
    XLSX.writeFile(wb, fileName);
    toast('File Excel absensi berhasil diunduh');
}

function showJournalDocumentation(id) {
    const journal = allData.find(d => d.__backendId === id && d.type === 'journal');
    if (!journal || !journal.documentation) return toast('Dokumentasi tidak ditemukan', 'error');

    const docSrc = journal.documentation;
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-700">
            <div>
                <h3 class="font-semibold">Dokumentasi Jurnal</h3>
                <p class="text-xs text-slate-500 dark:text-slate-400">${journal.class_id || '-'} • ${journal.date || '-'}</p>
            </div>
            <button id="close-doc-modal" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700" title="Tutup">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="p-4 max-h-[78vh] overflow-auto bg-slate-50 dark:bg-slate-900 text-center">
            <img src="${docSrc}" alt="Dokumentasi Jurnal" class="max-w-full max-h-[72vh] mx-auto rounded-lg border border-slate-200 dark:border-slate-700 object-contain" onerror="this.replaceWith(Object.assign(document.createElement('p'), {className:'text-sm text-red-500', textContent:'Dokumentasi tidak dapat ditampilkan.'}))">
        </div>
    </div>`;
    document.body.appendChild(overlay);

    const closeModal = () => overlay.remove();
    overlay.querySelector('#close-doc-modal').onclick = closeModal;
    overlay.addEventListener('click', (event) => {
        if (event.target === overlay) closeModal();
    });

    if (window.lucide) lucide.createIcons();
}

function openJournalDocumentationInNewTab(id) {
    const journal = allData.find(d => d.__backendId === id && d.type === 'journal');
    if (!journal || !journal.documentation) return toast('Dokumentasi tidak ditemukan', 'error');

    const docSrc = journal.documentation;
    const newWindow = window.open('', '_blank');
    if (!newWindow) return toast('Popup diblokir. Izinkan popup untuk membuka dokumentasi.', 'error');

    if (docSrc.startsWith('data:image/')) {
        newWindow.document.write(`<!doctype html><html><head><title>Dokumentasi Jurnal</title><style>body{margin:0;background:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh}img{max-width:100%;max-height:100vh;object-fit:contain}</style></head><body><img src="${docSrc}" alt="Dokumentasi Jurnal"></body></html>`);
        newWindow.document.close();
    } else {
        newWindow.location.href = docSrc;
    }
}

function downloadJournalDocumentation(id) {
    const journal = allData.find(d => d.__backendId === id && d.type === 'journal');
    if (!journal || !journal.documentation) return toast('Dokumentasi tidak ditemukan', 'error');

    const link = document.createElement('a');
    link.href = journal.documentation;
    link.download = `Dokumentasi_Jurnal_${(journal.class_id || 'kelas').replace(/\s+/g, '_')}_${journal.date || 'tanggal'}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function handleDocumentationUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const preview = document.getElementById('doc-preview');
        preview.innerHTML = `
            <div class="inline-block relative mt-2">
                <img src="${e.target.result}" alt="Preview" class="h-24 rounded-lg border border-slate-300">
                <button onclick="removeDocumentationPreview()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        `;
        document.getElementById('inp-j-doc').dataset.base64 = e.target.result;
        lucide.createIcons();
    };
    reader.readAsDataURL(file);
}

function removeDocumentationPreview() {
    document.getElementById('inp-j-doc').value = '';
    delete document.getElementById('inp-j-doc').dataset.base64;
    document.getElementById('doc-preview').innerHTML = '';
}

async function saveJurnal() {
    const date = document.getElementById('inp-j-date').value;
    const cls = document.getElementById('inp-j-class').value;
    const subject = document.getElementById('inp-j-subject').value.trim();
    const topic = document.getElementById('inp-j-topic').value.trim();
    const desc = document.getElementById('inp-j-desc').value.trim();
    const docFile = document.getElementById('inp-j-doc').dataset.base64 || '';
    if (!topic) return toast('Topik harus diisi', 'error');
    const r = await window.dataSdk.create({ type: 'journal', date, class_id: cls, subject, journal_topic: topic, journal_desc: desc, documentation: docFile, created_at: new Date().toISOString() });
    if (r.isOk) toast('Jurnal disimpan');
    else toast('Gagal', 'error');
}

async function toggleBlockUser(id) {
    const rec = allData.find(d => d.__backendId === id);
    if (!rec) return;
    const isBlocked = rec.is_blocked === true || rec.is_blocked === 'true';
    rec.is_blocked = !isBlocked;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) {
        const msg = rec.is_blocked ? 'Akun diblokir' : 'Blokir dibuka';
        toast(msg);
    } else toast('Gagal', 'error');
}

function confirmDeleteUser(id) {
    if (!currentUser || currentUser.role !== 'admin') {
        return toast('Hapus akun hanya bisa dilakukan oleh admin', 'error');
    }

    const rec = allData.find(d => d.__backendId === id && d.type === 'user');
    if (!rec) return toast('Akun tidak ditemukan', 'error');
    if (rec.__backendId === currentUser.__backendId) return toast('Akun yang sedang login tidak bisa dihapus dari menu ini', 'error');

    const admins = getUsers().filter(u => u.role === 'admin');
    if (rec.role === 'admin' && admins.length <= 1) {
        return toast('Admin terakhir tidak bisa dihapus', 'error');
    }

    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">

        <div class="flex gap-2 justify-end">
            <button id="cancel-du" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-du" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm inline-flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Akun</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    if (window.lucide) lucide.createIcons();

    overlay.querySelector('#cancel-du').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-du').onclick = async () => {
        overlay.remove();
        const r = await window.dataSdk.delete(rec);
        if (r.isOk) {
            toast('Akun berhasil dihapus');
            renderCurrentPage();
        } else {
            toast('Gagal menghapus akun', 'error');
        }
    };
}

// ============ SETTINGS ============
function renderSettings() {
    return `<div class="fade-in max-w-2xl">
        <h2 class="text-2xl font-bold mb-5">Pengaturan</h2>
        <div class="space-y-4">
            <!-- Profil & Foto -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Profil & Foto</h3>
                <div class="flex items-center gap-4 mb-4">
                    <div id="profile-photo-container" class="relative">
                        <img id="profile-photo-display" src="${currentUser.photo || ''}" alt="Foto Profil" class="w-20 h-20 rounded-full object-cover bg-blue-100 dark:bg-blue-900 border-2 border-blue-200 ${currentUser.photo?'':'hidden'}">
                        <div id="profile-photo-placeholder" class="w-20 h-20 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-2xl font-bold text-blue-600 ${currentUser.photo?'hidden':''}">${currentUser.name.charAt(0)}</div>
                        <button onclick="document.getElementById('photo-input').click()" class="absolute -bottom-1 -right-1 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full shadow-lg">
                            <i data-lucide="camera" class="w-3 h-3"></i>
                        </button>
                    </div>
                    <input id="photo-input" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    <div>
                        <p class="font-medium">${currentUser.name}</p>
                        <p class="text-sm text-slate-500">${currentUser.email}</p>
                        <p class="text-xs text-slate-400 mt-1">Role: ${currentUser.role === 'wali_kelas' ? 'Wali Kelas' : currentUser.role}</p>
                        ${currentUser.photo ? `<button onclick="deleteProfilePhoto()" class="text-xs text-red-600 hover:underline mt-2">Hapus Foto</button>` : ''}
                    </div>
                </div>
            </div>
            <!-- Ubah Email/Password -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="edit" class="w-4 h-4"></i> Ubah Akun</h3>
                <div class="space-y-3">
                    <div><label class="text-sm font-medium">Email Baru</label><input id="set-email" type="email" value="${currentUser.email}" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm"></div>
                    <div><label class="text-sm font-medium">Password Baru</label><input id="set-pass" type="password" class="w-full mt-1 px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 dark:bg-slate-700 text-sm" placeholder="Kosongkan jika tidak diubah"></div>
                    <button onclick="updateAccount()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium">Simpan Perubahan</button>
                </div>
            </div>
            <!-- Tema -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="sun" class="w-4 h-4"></i> Tema</h3>
                <div class="flex gap-3">
                    <button onclick="setTheme('light')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='light'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Terang</button>
                    <button onclick="setTheme('dark')" class="px-4 py-2 rounded-lg text-sm font-medium ${appTheme==='dark'?'bg-blue-600 text-white':'bg-slate-100 dark:bg-slate-700'}">Gelap</button>
                </div>
            </div>
            <!-- Logout & Hapus -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-5 shadow-sm border border-slate-200 dark:border-slate-700">
                <h3 class="font-semibold mb-3 flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> Akun</h3>
                <div class="flex flex-wrap gap-3">
                    <button onclick="logout()" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 hover:bg-slate-300 rounded-lg text-sm font-medium">Logout</button>
                    ${currentUser.role === 'admin' ? `<button onclick="confirmDeleteAccount()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium inline-flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Akun</button>` : ''}
                </div>
            </div>
        </div>
    </div>`;
}

function renderPengaturan() {
    return renderSettings();
}

async function updateAccount() {
    const email = document.getElementById('set-email').value.trim();
    const pass = document.getElementById('set-pass').value;
    if (!email) return toast('Email tidak boleh kosong', 'error');
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (!rec) return;
    rec.email = email;
    if (pass && pass.length >= 6) rec.password = pass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) { currentUser = rec; toast('Akun diperbarui'); renderCurrentPage(); }
    else toast('Gagal', 'error');
}

function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const photoData = e.target.result;
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) {
            rec.photo = photoData;
            currentUser.photo = photoData;
            const r = await window.dataSdk.update(rec);
            if (r.isOk) { toast('Foto berhasil diupload'); renderCurrentPage(); }
            else toast('Gagal upload foto', 'error');
        }
    };
    reader.readAsDataURL(file);
}

async function deleteProfilePhoto() {
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) {
        rec.photo = '';
        currentUser.photo = '';
        const r = await window.dataSdk.update(rec);
        if (r.isOk) { toast('Foto berhasil dihapus'); renderCurrentPage(); }
        else toast('Gagal hapus foto', 'error');
    }
}

async function setTheme(theme) {
    appTheme = theme;
    applyTheme();
    const rec = allData.find(d => d.__backendId === currentUser.__backendId);
    if (rec) { rec.theme = theme; await window.dataSdk.update(rec); }
    renderCurrentPage();
}

async function adminResetPassword() {
    const userId = document.getElementById('admin-user-select').value;
    const newPass = document.getElementById('admin-new-pass').value;
    
    if (!userId || !newPass) return toast('Pilih pengguna dan masukkan password baru', 'error');
    if (newPass.length < 6) return toast('Password minimal 6 karakter', 'error');
    
    const rec = allData.find(d => d.__backendId === userId);
    if (!rec) return;
    
    rec.password = newPass;
    const r = await window.dataSdk.update(rec);
    if (r.isOk) {
        toast('Password berhasil direset');
        document.getElementById('admin-user-select').value = '';
        document.getElementById('admin-new-pass').value = '';
    }
    else toast('Gagal mereset password', 'error');
}

function confirmDeleteAccount() {
    if (!currentUser || currentUser.role !== 'admin') {
        return toast('Hapus akun hanya bisa dilakukan oleh admin', 'error');
    }
    const admins = getUsers().filter(u => u.role === 'admin');
    if (admins.length <= 1) {
        return toast('Admin terakhir tidak bisa dihapus', 'error');
    }
    const overlay = document.createElement('div');
    overlay.className = 'fixed inset-0 bg-black/40 flex items-center justify-center z-50';
    overlay.innerHTML = `<div class="bg-white dark:bg-slate-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
        <p class="font-semibold mb-2 text-red-600">Hapus Akun?</p>
        <p class="text-sm text-slate-500 mb-4">Akun Anda akan dihapus permanen. Tindakan ini tidak dapat dibatalkan.</p>
        <div class="flex gap-2 justify-end">
            <button id="cancel-da" class="px-4 py-2 bg-slate-200 dark:bg-slate-600 rounded-lg text-sm">Batal</button>
            <button id="confirm-da" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm">Hapus</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cancel-da').onclick = () => overlay.remove();
    overlay.querySelector('#confirm-da').onclick = async () => {
        overlay.remove();
        const rec = allData.find(d => d.__backendId === currentUser.__backendId);
        if (rec) await window.dataSdk.delete(rec);
        logout();
        toast('Akun dihapus');
    };
}

// ============ RESPONSIVE ============
window.addEventListener('resize', () => {
    const sb = document.getElementById('sidebar');
    if (window.innerWidth >= 1024) {
        sb.classList.remove('hidden', 'fixed', 'z-40', 'inset-0');
    }
});
</script></body>
</html>
